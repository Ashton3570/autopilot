name: econ-calendar

on:
  schedule:
    # 21:30 UTC = 06:30 KST, every day (upcoming 7-day macro calendar)
    - cron: '30 21 * * *'
  workflow_dispatch:        # trigger manually from the phone GitHub app

permissions:
  contents: write

concurrency:
  group: autopilot-push
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run economic calendar (next 7 days)
        working-directory: econ-calendar
        run: python3 econ_calendar.py --days 7
      - name: Rebuild dashboard
        run: python3 tools/build_index.py
      - name: Commit outputs
        run: |
          git config user.name "autopilot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "nothing to commit"; exit 0; }
          git commit -m "econ-calendar: run $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "push retry $i"; sleep 5
          done
          exit 1
