name: market-sentiment

on:
  schedule:
    # 21:00 UTC = 06:00 KST, weekdays (after US market close)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:        # lets you trigger manually from the phone GitHub app

permissions:
  contents: write

concurrency:
  group: autopilot-push     # shared with the other tools so pushes never race
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run sentiment brief
        working-directory: market-sentiment
        run: python3 brief.py
      - name: Rebuild dashboard
        run: python3 tools/build_index.py
      - name: Commit outputs
        run: |
          git config user.name "autopilot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "nothing to commit"; exit 0; }
          git commit -m "market-sentiment: run $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "push retry $i"; sleep 5
          done
          exit 1
