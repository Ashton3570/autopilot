name: intraday-ta

on:
  schedule:
    # 20:45 UTC = 05:45 KST, weekdays (captures the full US session)
    - cron: '45 20 * * 1-5'
  workflow_dispatch:        # trigger manually from the phone GitHub app

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run TA snapshots for each ticker in watchlist.txt
        working-directory: intraday-ta
        run: |
          while IFS= read -r t || [ -n "$t" ]; do
            case "$t" in ''|\#*) continue ;; esac
            echo "== $t =="
            python3 ta.py "$t" || echo "failed: $t"
          done < watchlist.txt
      - name: Commit outputs
        run: |
          git config user.name "autopilot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add intraday-ta               # folder-scoped: never conflicts with other tools
          git diff --cached --quiet && { echo "nothing to commit"; exit 0; }
          git commit -m "intraday-ta: run $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "push retry $i"; sleep 5
          done
          exit 1
